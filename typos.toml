# typos spell-checker config. https://github.com/crate-ci/typos
# Allow project-specific tokens that are not misspellings.
[files]
# Not prose: vendored RTK filter data (upstream wording preserved verbatim)
# and captured real command outputs used as benchmark fixtures.
extend-exclude = [
  "src/tools/bash/filter/data/",
  "src/tools/bash/filter/corpus/",
  # Real source files copied verbatim as skim-mode benchmark fixtures.
  "src/tools/skim/corpus/",
  # Real source files copied verbatim as grep-output benchmark fixtures.
  "src/tools/grep_corpus/",
]
[default.extend-identifiers]
# Repository owner / handle.
"5omeOtherGuy" = "5omeOtherGuy"

[default.extend-words]
# Streaming test fixtures split a word across deltas ("Hel" + "lo").
Hel = "Hel"
# Rust TUI crate name.
ratatui = "ratatui"
