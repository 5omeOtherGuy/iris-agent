# typos spell-checker config. https://github.com/crate-ci/typos
# Allow project-specific tokens that are not misspellings.
[files]
# Not prose: vendored RTK filter data (upstream wording preserved verbatim)
# and captured real command outputs used as benchmark fixtures.
extend-exclude = [
  "src/tools/bash/filter/data/",
  "src/tools/bash/filter/corpus/",
  # Real source files copied verbatim as skim-mode benchmark fixtures.
  "src/tools/skim/corpus/",
  # Real source files copied verbatim as grep-output benchmark fixtures.
  "src/tools/grep_corpus/",
  # Captured real find listings used as find-compaction benchmark fixtures.
  "src/tools/find_corpus/",
  # Captured real `ls -la` listings used as ls token-efficiency fixtures.
  "src/tools/ls_corpus/",
  # Captured real web pages / search responses used as web-tools
  # token-efficiency fixtures (HTML, Markdown, text/plain); not prose.
  "src/tools/web/corpus/",
  # Task-scaffold fixtures for the end-to-end tokens-per-task benchmark
  # (issue #210): mini source trees and captured-style test logs, not prose.
  "iris-bench/fixtures/",
  "src/bench_fixtures/tokens_per_task/",
]
[default.extend-identifiers]
# Repository owner / handle.
"5omeOtherGuy" = "5omeOtherGuy"
# Short reference-repository commit pinned in the AskUserQuestion spec.
"6ba4060" = "6ba4060"

[default.extend-words]
# Streaming test fixtures split a word across deltas ("Hel" + "lo").
Hel = "Hel"
# Charset-decoding tests split "caf\u{e9}" (cafe) across raw bytes.
caf = "caf"
# Rust TUI crate name.
ratatui = "ratatui"
