<svg xmlns="http://www.w3.org/2000/svg" width="630" height="158" viewBox="0 0 630 158" role="img" aria-label="What are you? — A precise, token-efficient coding agent for the terminal.">
<style>
  text { font-family: 'DejaVu Sans Mono','Liberation Mono','Cascadia Mono','JetBrains Mono',Menlo,Consolas,'Courier New',monospace; font-size:16px; white-space:pre; dominant-baseline:middle; }
  .ink{fill:#e6e6e6;} .muted{fill:#8b8b93;}
  .led-base{fill:#8b8b93;}
  .led{fill:#d78700;opacity:0;}
