  @keyframes chase{0%,25%{opacity:1;}25.01%,100%{opacity:0;}}
  @media (prefers-reduced-motion: reduce){
    #l0,#l1,#l2,#l3{animation:none;} #l0{opacity:1;}
  }
</style>
