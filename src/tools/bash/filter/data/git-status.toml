# iris-authored (interim declarative filter; structured Rust filter is PR 2 of #336)
[filters.git-status]
description = "Compact git status output — strip advice/hint lines and blanks, keep branch, tracking, and per-file state"
match_command = '^git\s+(-[Cc]\s+\S+\s+)?status\b'
strip_ansi = true
strip_lines_matching = [
  '^\s*$',
  '^\s*\(use "git .+\)$',
  '^\s*\(fix conflicts and run "git .+\)$',
  '^\s*\(all conflicts fixed: run "git .+\)$',
  '^\s*\(commit or discard the untracked or modified content in submodules\)$',
]

[[tests.git-status]]
name = "hints and blanks stripped, file state kept"
input = """
On branch feat/thing
Your branch is ahead of 'origin/main' by 2 commits.
  (use "git push" to publish your local commits)

Changes to be committed:
  (use "git restore --staged <file>..." to unstage)
	modified:   src/lib.rs

Changes not staged for commit:
  (use "git add <file>..." to update what will be committed)
  (use "git restore <file>..." to discard changes in working directory)
	modified:   src/main.rs

Untracked files:
  (use "git add <file>..." to include in what will be committed)
	notes.txt

no changes added to commit (use "git add" and/or "git commit -a")
"""
expected = """
On branch feat/thing
Your branch is ahead of 'origin/main' by 2 commits.
Changes to be committed:
	modified:   src/lib.rs
Changes not staged for commit:
	modified:   src/main.rs
Untracked files:
	notes.txt
no changes added to commit (use "git add" and/or "git commit -a")
"""

[[tests.git-status]]
name = "clean tree passes through minus blanks"
input = """
On branch main
Your branch is up to date with 'origin/main'.

nothing to commit, working tree clean
"""
expected = """
On branch main
Your branch is up to date with 'origin/main'.
nothing to commit, working tree clean
"""
