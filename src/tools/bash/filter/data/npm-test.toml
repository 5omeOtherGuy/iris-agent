# iris-authored (interim declarative filter; structured Rust filter is PR 2 of #336)
[filters.npm-test]
description = "Compact npm/pnpm/yarn test output (jest/vitest style) — strip per-test pass lines, keep failures and summaries"
match_command = "^((npm|pnpm|yarn|bun)\\s+(run\\s+)?(t|test)\\b|(npx\\s+)?(jest|vitest)\\b)"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^> ",
  "^\\s*(✓|✔|√) ",
  "^\\s*PASS\\b",
  "^\\s*(RUN|RUNS)\\b",
  "^\\s*Ran all test suites",
]
on_empty = "ok (tests passed; per-test listing filtered)"

[[tests.npm-test]]
name = "passing jest run reduces to summary"
input = """
> myapp@1.0.0 test
> jest

PASS src/utils.test.js
  ✓ parses config (3 ms)
  ✓ merges defaults (1 ms)
PASS src/api.test.js
  ✓ fetches user (12 ms)

Test Suites: 2 passed, 2 total
Tests:       3 passed, 3 total
Snapshots:   0 total
Time:        1.802 s
Ran all test suites.
"""
expected = """
Test Suites: 2 passed, 2 total
Tests:       3 passed, 3 total
Snapshots:   0 total
Time:        1.802 s
"""

[[tests.npm-test]]
name = "failing jest run keeps failure detail verbatim"
input = """
> myapp@1.0.0 test
> jest

PASS src/utils.test.js
  ✓ parses config (3 ms)
FAIL src/api.test.js
  ✕ fetches user (14 ms)

  ● fetches user

    expect(received).toEqual(expected) // deep equality

    Expected: 200
    Received: 404

      12 |   const res = await fetchUser(1);
    > 13 |   expect(res.status).toEqual(200);
         |                      ^
      14 | });

      at Object.<anonymous> (src/api.test.js:13:22)

Test Suites: 1 failed, 1 passed, 2 total
Tests:       1 failed, 1 passed, 2 total
Time:        2.113 s
"""
expected = """
FAIL src/api.test.js
  ✕ fetches user (14 ms)
  ● fetches user
    expect(received).toEqual(expected) // deep equality
    Expected: 200
    Received: 404
      12 |   const res = await fetchUser(1);
    > 13 |   expect(res.status).toEqual(200);
         |                      ^
      14 | });
      at Object.<anonymous> (src/api.test.js:13:22)
Test Suites: 1 failed, 1 passed, 2 total
Tests:       1 failed, 1 passed, 2 total
Time:        2.113 s
"""

[[tests.npm-test]]
name = "empty input returns on_empty message"
input = ""
expected = "ok (tests passed; per-test listing filtered)"
