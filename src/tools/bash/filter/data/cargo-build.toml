# iris-authored (interim declarative filter; structured Rust filter is PR 2 of #336)
[filters.cargo-build]
description = "Compact cargo build/check/clippy/run output — strip per-crate status lines, keep diagnostics and program output"
match_command = "^cargo\\s+(\\+\\S+\\s+)?(b|build|c|check|clippy|r|run|fix|doc)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*(Compiling|Downloading|Downloaded|Updating|Locking|Adding|Removing|Checking|Documenting|Fresh|Blocking|Building|Finished|Installing|Installed)\\s",
  "^\\s+Running `",
  "^warning: .+ generated \\d+ warnings?( .*)?$",
]
on_empty = "ok"

[[tests.cargo-build]]
name = "clean build reduces to ok"
input = """
   Compiling proc-macro2 v1.0.86
   Compiling serde v1.0.204
   Compiling iris-agent v0.4.2 (/home/user/project)
    Finished `dev` profile [unoptimized + debuginfo] target(s) in 24.31s
"""
expected = "ok"

[[tests.cargo-build]]
name = "warnings survive, per-crate chatter does not"
input = """
   Compiling foo v0.1.0 (/home/user/foo)
warning: unused variable: `x`
 --> src/main.rs:2:9
  |
2 |     let x = 1;
  |         ^ help: if this is intentional, prefix it with an underscore: `_x`
  |
  = note: `#[warn(unused_variables)]` on by default

warning: `foo` (bin "foo") generated 1 warning
    Finished `dev` profile [unoptimized + debuginfo] target(s) in 0.52s
"""
expected = """
warning: unused variable: `x`
 --> src/main.rs:2:9
  |
2 |     let x = 1;
  |         ^ help: if this is intentional, prefix it with an underscore: `_x`
  |
  = note: `#[warn(unused_variables)]` on by default
"""

[[tests.cargo-build]]
name = "compile error is untouched"
input = """
   Compiling foo v0.1.0 (/home/user/foo)
error[E0425]: cannot find value `nope` in this scope
 --> src/main.rs:2:13
  |
2 |     let y = nope;
  |             ^^^^ not found in this scope
error: could not compile `foo` (bin "foo") due to 1 previous error
"""
expected = """
error[E0425]: cannot find value `nope` in this scope
 --> src/main.rs:2:13
  |
2 |     let y = nope;
  |             ^^^^ not found in this scope
error: could not compile `foo` (bin "foo") due to 1 previous error
"""

[[tests.cargo-build]]
name = "cargo run keeps program output"
input = """
   Compiling app v0.1.0 (/home/user/app)
    Finished `dev` profile [unoptimized + debuginfo] target(s) in 1.02s
     Running `target/debug/app`
hello from the app
"""
expected = "hello from the app"
