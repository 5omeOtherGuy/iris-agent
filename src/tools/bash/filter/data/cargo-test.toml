# iris-authored (interim declarative filter; structured Rust filter is PR 2 of #336)
[filters.cargo-test]
description = "Compact cargo test output — strip build chatter and passing-test lines, keep failures verbatim and the result summary"
match_command = "^cargo\\s+(\\+\\S+\\s+)?(t|test|nextest)\\b"
strip_ansi = true
strip_lines_matching = [
  "^\\s*$",
  "^\\s*(Compiling|Downloading|Downloaded|Updating|Locking|Adding|Removing|Checking|Documenting|Fresh|Blocking|Building|Finished)\\s",
  "^\\s+Running (unittests |tests/|benches/)",
  "^\\s+Doc-tests\\s",
  "^running \\d+ tests?$",
  "^test [^ ]+ \\.\\.\\. ok$",
]
on_empty = "ok (cargo test: no summary output)"

[[tests.cargo-test]]
name = "passing run reduces to result summaries"
input = """
   Compiling iris-agent v0.4.2 (/home/user/project)
    Finished `test` profile [unoptimized + debuginfo] target(s) in 12.41s
     Running unittests src/main.rs (target/debug/deps/iris-25e0d3c)

running 3 tests
test tools::bash::tests::runs ... ok
test tools::edit::tests::applies ... ok
test tools::read::tests::windows ... ok

test result: ok. 3 passed; 0 failed; 0 ignored; 0 measured; 0 filtered out; finished in 0.42s
"""
expected = "test result: ok. 3 passed; 0 failed; 0 ignored; 0 measured; 0 filtered out; finished in 0.42s"

[[tests.cargo-test]]
name = "failing run keeps failure detail verbatim"
input = """
    Finished `test` profile [unoptimized + debuginfo] target(s) in 0.31s
     Running unittests src/lib.rs (target/debug/deps/foo-9c1b2a)

running 2 tests
test tests::works ... ok
test tests::broken ... FAILED

failures:

---- tests::broken stdout ----
thread 'tests::broken' panicked at src/lib.rs:42:9:
assertion `left == right` failed
  left: 1
 right: 2

failures:
    tests::broken

test result: FAILED. 1 passed; 1 failed; 0 ignored; 0 measured; 0 filtered out; finished in 0.01s
"""
expected = """
test tests::broken ... FAILED
failures:
---- tests::broken stdout ----
thread 'tests::broken' panicked at src/lib.rs:42:9:
assertion `left == right` failed
  left: 1
 right: 2
failures:
    tests::broken
test result: FAILED. 1 passed; 1 failed; 0 ignored; 0 measured; 0 filtered out; finished in 0.01s
"""

[[tests.cargo-test]]
name = "compile error in test build is untouched"
input = """
   Compiling foo v0.1.0 (/home/user/foo)
error[E0308]: mismatched types
 --> src/lib.rs:5:20
  |
5 |     let x: i32 = "nope";
  |            ---   ^^^^^^ expected `i32`, found `&str`
error: could not compile `foo` (lib) due to 1 previous error
"""
expected = """
error[E0308]: mismatched types
 --> src/lib.rs:5:20
  |
5 |     let x: i32 = "nope";
  |            ---   ^^^^^^ expected `i32`, found `&str`
error: could not compile `foo` (lib) due to 1 previous error
"""
