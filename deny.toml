# cargo-deny configuration. See https://embarkstudios.github.io/cargo-deny/
#
# CI (.github/workflows/cargo-deny.yml) runs `check advisories bans sources`.
# The [licenses] section below is ready but NOT enforced in CI yet: run
# `cargo deny check licenses` locally, review the allow-list against the actual
# dependency tree, then add `licenses` to the CI command to enforce it.

[advisories]
version = 2
# RUSTSEC security advisories. Fail on vulnerable or yanked crates.
yanked = "deny"
ignore = []

[bans]
# Warn (do not fail) on duplicate versions of the same crate; tighten to "deny"
# once the tree is deduplicated.
multiple-versions = "warn"
wildcards = "allow"

[sources]
# Only crates.io and explicitly allowed git sources.
unknown-registry = "deny"
unknown-git = "deny"

[licenses]
version = 2
# Permissive licenses common in the Rust ecosystem. Review against
# `cargo deny check licenses` output before enforcing in CI.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Unicode-3.0",
  "Unicode-DFS-2016",
  "Zlib",
  "MPL-2.0",
  "CC0-1.0",
]
confidence-threshold = 0.8
