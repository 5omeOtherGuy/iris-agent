# GitHub autogenerated release notes configuration.
# Keep category titles aligned with conventional change types so generated
# notes can be reviewed before release.
changelog:
  exclude:
    labels:
      - skip-changelog
      - duplicate
      - invalid
      - question
      - wontfix
    authors:
      - dependabot[bot]
  categories:
    - title: Added
      labels:
        - "type: feature"
        - feature
        - enhancement
        - added
    - title: Fixed
      labels:
        - "type: fix"
        - bug
        - fix
        - fixed
    - title: Security
      labels:
        - security
        - "type: security"
    - title: Removed
      labels:
        - removed
        - "type: removal"
        - breaking-change
    - title: Documentation
      labels:
        - documentation
        - docs
        - "type: docs"
    - title: Changed
      labels:
        - "type: changed"
        - changed
        - refactor
        - performance
        - tooling
        - chore
        - "*"
