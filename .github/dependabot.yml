# Dependabot keeps dependencies up to date by opening pull requests when new
# versions are released. Free for all repositories. Docs:
# https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2
updates:
  # Update Cargo dependencies (dependencies in Cargo.toml / Cargo.lock).
  - package-ecosystem: cargo
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - cargo
    commit-message:
      prefix: deps
      include: scope
    # Group all non-major updates into one PR per week to reduce noise.
    groups:
      cargo-minor-and-patch:
        update-types:
          - minor
          - patch

  # Update versions of GitHub Actions used in workflows (uses: actions/...@vN).
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: "Europe/Berlin"
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    commit-message:
      prefix: ci
      include: scope
