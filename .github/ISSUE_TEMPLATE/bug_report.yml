name: Bug report
description: Report a reproducible Iris/Nexus problem
title: "Bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Do not include secrets, tokens, private session logs, provider payloads, or local-only notes.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use non-secret sample data.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Iris version or commit
      placeholder: v0.1.0 or commit SHA
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: rustc version, OS, provider/model in use.
  - type: textarea
    id: notes
    attributes:
      label: Additional context
      description: Redact private paths, credentials, tokens, and provider output.
