name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  scope:
    name: Classify changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      docs-only: ${{ steps.scope.outputs.docs-only }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Classify change scope
        id: scope
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: echo "docs-only=$(bash scripts/change-scope.sh "$BASE_SHA" "$HEAD_SHA")" >>"$GITHUB_OUTPUT"

  test:
    name: Test (stable)
    needs: scope
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Check documentation whitespace
        if: needs.scope.result == 'success' && needs.scope.outputs.docs-only == 'true'
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha || github.event.before }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
        run: git diff --check "$BASE_SHA...$HEAD_SHA"

      - name: Documentation-only gate summary
        if: needs.scope.result == 'success' && needs.scope.outputs.docs-only == 'true'
        run: echo "Documentation-only change; Rust checks are not required."

      - name: Install Rust toolchain
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo build
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        uses: Swatinem/rust-cache@v2

      - name: Format
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: cargo fmt --all --check

      - name: Clippy
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: cargo test --locked

      - name: Test change-scope script
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: bash scripts/change-scope-tests.sh

      - name: Test sync-primary script
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: bash scripts/sync-primary-tests.sh

      - name: Check repository guidance integrity
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: bash scripts/check-repo-guidance.sh

      - name: Test repository guidance checks
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: bash scripts/repo-guidance-tests.sh

      - name: Test worktree creation script
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: bash scripts/worktree-create-tests.sh

      - name: Build
        if: needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true'
        run: cargo build --locked

  build-macos:
    name: Build (macOS)
    needs: scope
    if: always() && (needs.scope.result != 'success' || needs.scope.outputs.docs-only != 'true')
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: Swatinem/rust-cache@v2

      # macOS is a supported launch platform (no kernel sandbox yet; the shell
      # runs unconfined, surfaced in the approval UI). Verify the build so the
      # Linux-only sandbox path stays cfg-gated correctly. A manual smoke pass
      # is an ops follow-up tracked in the PR.
      - name: Build
        run: cargo build --locked
