# Validate that PR titles follow Conventional Commits, so squash-merge commit
# subjects and autogenerated release notes stay consistent.
name: PR title

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

concurrency:
  group: pr-title-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  lint-title:
    name: Lint PR title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check Conventional Commit title
        uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            deps
            docs
            test
            refactor
            perf
            build
            ci
            chore
            revert
