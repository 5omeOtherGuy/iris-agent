# Prebuilt-binary release pipeline, driven by cargo-dist (dist).
#
# On a version tag push, dist builds the per-target archives + SHA-256 checksums
# and the shell installer, and the host job creates the GitHub release for the
# tag and attaches them. The tag is pushed by an operator (see
# docs/RELEASING.md); a tag pushed by release-plz's default GITHUB_TOKEN would
# not trigger this workflow. release-plz does not own the release object
# (git_release_enable = false) and no crates.io token is required. Configuration
# lives in `[workspace.metadata.dist]` in Cargo.toml.
#
# This file delegates artifact building to the pinned `dist` CLI rather than
# hand-rolling a build matrix. `dist` is installed with `cargo install
# cargo-dist --locked --version ${DIST_VERSION}` rather than an unpinned
# `curl | sh`: cargo pins the exact version and verifies the crate against the
# immutable crates.io registry checksum, and `--locked` reproduces its
# dependency tree. Keep `DIST_VERSION` in sync with `cargo-dist-version` in
# Cargo.toml (a unit test enforces this). The workflow is hand-maintained
# (`allow-dirty = ["ci"]` in Cargo.toml); re-diff `dist generate` when bumping
# the version.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  DIST_VERSION: "0.28.0"

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Plan
        id: plan
        run: dist plan --output-format=json > dist-manifest.json
      - name: Upload plan
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-plan-dist-manifest
          path: dist-manifest.json

  build-local-artifacts:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    # Build prebuilt release binaries with the dist marker so `iris update`
    # self-replaces (build.rs turns IRIS_DIST=1 into the `iris_dist` cfg).
    env:
      IRIS_DIST: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Install cargo-zigbuild for Linux aarch64 cross-builds
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          python3 -m pip install --user cargo-zigbuild==0.23.0 ziglang==0.16.0
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/cargo-zigbuild" --version
          "$HOME/.local/bin/python-zig" version
      - name: Build artifacts
        run: dist build --artifacts=local --target=${{ matrix.target }} --output-format=json > dist-manifest.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: artifacts-build-${{ matrix.target }}
          # The shell installer is a cargo-dist "global" artifact; it is built in
          # the host job, not here, so only per-target archives + checksums are
          # uploaded from this matrix leg.
          path: |
            target/distrib/*.tar.gz
            target/distrib/*.tar.gz.sha256

  # Build the shell installer (a cargo-dist "global" artifact) and publish the
  # GitHub release for the pushed tag with every per-target archive, its SHA-256
  # sidecar, and the installer attached. Creating the release here with `gh`
  # makes a manually pushed tag self-sufficient: release-plz does not own the
  # release (git_release_enable = false) and no crates.io token is required.
  host:
    needs: [plan, build-local-artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Download per-target artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: artifacts-build-*
          path: target/distrib
          merge-multiple: true
      - name: Build installer (global artifact)
        run: dist build --artifacts=global --output-format=json > dist-manifest.json
      - name: Publish GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          cd target/distrib
          # Require the full asset set so a partial build never publishes a
          # half-populated release. Four targets x (archive + checksum) + installer.
          assets=""
          for t in x86_64-unknown-linux-gnu aarch64-unknown-linux-gnu \
                   x86_64-apple-darwin aarch64-apple-darwin; do
            for f in "iris-agent-$t.tar.gz" "iris-agent-$t.tar.gz.sha256"; do
              [ -f "$f" ] || { echo "missing release asset: $f" >&2; exit 1; }
              assets="$assets $f"
            done
          done
          [ -f iris-agent-installer.sh ] || { echo "missing installer" >&2; exit 1; }
          assets="$assets iris-agent-installer.sh"
          # A tag with a prerelease component (v0.3.0-rc.1) is a testing
          # channel: mark the release object prerelease so it never becomes
          # `releases/latest` — install.sh and `iris update` resolve latest, so
          # users can never be handed a testing build (`decide_update` also
          # refuses prerelease tags as a second, client-side gate).
          prerelease=""
          case "$TAG" in
            *-*) prerelease="--prerelease" ;;
          esac
          # Idempotent so the job can be re-run: create the release only if it is
          # absent, then upload assets with --clobber to replace any partial ones.
          # Created as a draft and published only after every asset is attached:
          # a draft is invisible to `releases/latest`, so an install or update
          # can never resolve a release whose archives are still uploading.
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            # shellcheck disable=SC2086
            gh release create "$TAG" --draft $prerelease --title "Iris $TAG" --generate-notes
          fi
          # shellcheck disable=SC2086
          gh release upload "$TAG" --clobber $assets
          gh release edit "$TAG" --draft=false
