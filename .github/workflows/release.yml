# Prebuilt-binary release pipeline, driven by cargo-dist (dist).
#
# On a version tag push (release-plz creates the tag and GitHub release), dist
# builds the per-target archives + SHA-256 checksums and the `curl | sh`
# installer, then uploads them to the release. Configuration lives in
# `[workspace.metadata.dist]` in Cargo.toml.
#
# This file delegates every step to the pinned `dist` CLI rather than
# hand-rolling a build matrix. `dist` is installed with `cargo install
# cargo-dist --locked --version ${DIST_VERSION}` rather than an unpinned
# `curl | sh`: cargo pins the exact version and verifies the crate against the
# immutable crates.io registry checksum, and `--locked` reproduces its
# dependency tree. Keep `DIST_VERSION` in sync with `cargo-dist-version` in
# Cargo.toml. Regenerate the canonical version with `dist init` + `dist
# generate` once the dist CLI is available in CI.
name: release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  DIST_VERSION: "0.28.0"

jobs:
  plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      manifest: ${{ steps.plan.outputs.manifest }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Plan
        id: plan
        run: dist plan --output-format=json > dist-manifest.json
      - name: Upload plan
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-plan-dist-manifest
          path: dist-manifest.json

  build-local-artifacts:
    needs: plan
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-latest
          - target: x86_64-apple-darwin
            runner: macos-latest
          - target: aarch64-apple-darwin
            runner: macos-latest
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    # Build prebuilt release binaries with the dist marker so `iris update`
    # self-replaces (build.rs turns IRIS_DIST=1 into the `iris_dist` cfg).
    env:
      IRIS_DIST: "1"
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Build artifacts
        run: dist build --artifacts=local --target=${{ matrix.target }} --output-format=json > dist-manifest.json
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-build-${{ matrix.target }}
          path: |
            target/distrib/*.tar.gz
            target/distrib/*.tar.gz.sha256
            target/distrib/*-installer.sh

  host:
    needs: [plan, build-local-artifacts]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Install dist
        run: cargo install cargo-dist --locked --version "${DIST_VERSION}"
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: artifacts-*
          path: target/distrib
          merge-multiple: true
      - name: Upload to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: dist host --steps=upload --steps=release --output-format=json > dist-manifest.json
