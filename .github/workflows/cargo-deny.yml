# cargo-deny: supply-chain linting for Rust dependencies.
# Checks the dependency tree against RUSTSEC security advisories, banned/
# duplicate crates, and disallowed sources. License enforcement is configured
# in deny.toml but intentionally not run here until the allow-list is reviewed
# (see deny.toml). Docs: https://embarkstudios.github.io/cargo-deny/
name: cargo-deny

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    # Weekly Monday scan catches newly published advisories against pinned deps.
    - cron: "31 5 * * 1"
  workflow_dispatch:

concurrency:
  group: cargo-deny-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  cargo-deny:
    name: Audit dependencies
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check advisories bans sources
