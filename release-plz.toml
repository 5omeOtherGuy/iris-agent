# release-plz configuration. https://release-plz.dev/docs/config
[workspace]
# Prebuilt binaries (cargo-dist) are the current distribution path. release-plz
# owns only the release PR (version bump + CHANGELOG); it does NOT create the
# git release or publish to crates.io:
#   - publish = false: no crates.io publish. Enabling `cargo install iris-agent`
#     later is an explicit opt-in (set publish = true and add CARGO_REGISTRY_TOKEN
#     per docs/RELEASING.md).
#   - git_tag_enable = false: release-plz never creates the git tag. The operator
#     pushes it by hand so the tag actually triggers release.yml (a tag pushed by
#     release-plz's default GITHUB_TOKEN would not). This also keeps the flow
#     correct if CARGO_REGISTRY_TOKEN is added later: release-plz would then only
#     publish to crates.io, never create the tag or release.
#   - git_release_enable = false: the release object is created by
#     .github/workflows/release.yml (cargo-dist host job) when an operator pushes
#     the version tag, so it also carries the prebuilt archives + installer.
# This avoids two systems racing to create the same tag or GitHub release.
publish = false
# Keep a Keep-a-Changelog style CHANGELOG.md generated from conventional commits.
changelog_update = true
git_tag_enable = false
git_release_enable = false
