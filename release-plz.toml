# release-plz configuration. https://release-plz.dev/docs/config
[workspace]
# Do not publish to crates.io; only maintain version + CHANGELOG via release PR.
# Flip to a real publish later by adding a CARGO_REGISTRY_TOKEN secret and a
# `release` command step.
publish = false
# Keep a Keep-a-Changelog style CHANGELOG.md generated from conventional commits.
changelog_update = true
git_release_enable = true
